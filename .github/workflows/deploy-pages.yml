name: Deploy dossier to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build model pages
        run: python3 scripts/build.py
      - name: Validate generated pages and sources
        run: python3 scripts/validate.py
      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html methodology.html claude-sample.html gpt.html gemini.html cursor.html devin.html grok.html copilot.html _site/
          cp -r src data dist docs _site/
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
